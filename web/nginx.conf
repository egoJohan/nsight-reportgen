server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SAV uploads can be a few MB; renders can take a while.
    client_max_body_size 50m;

    # API → backend. Every API path the SPA uses falls under one of these
    # top-level prefixes, so the SPA can use a relative (same-origin) base.
    location /cases       { proxy_pass http://backend:8200; }
    location /materials   { proxy_pass http://backend:8200; }
    location /chart-types { proxy_pass http://backend:8200; }

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # SPA fallback for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
