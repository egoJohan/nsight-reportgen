# Distinguish browser navigations (Accept: text/html — full-page loads, refresh,
# deep links to client-side routes like /cases/:id) from XHR/fetch API calls
# (Accept: */* or application/json). The SPA and the API share the /cases prefix,
# so this keeps deep-links working without a full-page 405 from the API.
map $http_accept $nsight_html_nav {
    default 0;
    "~*text/html" 1;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SAV uploads can be a few MB; renders can take a while.
    client_max_body_size 50m;

    # API → backend. Every API path the SPA uses falls under one of these
    # top-level prefixes, so the SPA can use a relative (same-origin) base.
    location /cases {
        # A browser navigating to a client-side route (/cases/:id) asks for
        # HTML — serve the SPA so the route resolves client-side. API fetch/XHR
        # calls (Accept: */*, application/json) fall through to the backend.
        if ($nsight_html_nav) { rewrite ^ /index.html last; }
        proxy_pass http://backend:8200;
    }
    location /materials   { proxy_pass http://backend:8200; }
    location /chart-types { proxy_pass http://backend:8200; }

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # SPA fallback for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
